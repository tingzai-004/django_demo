{% extends "test.html" %}

{% block content %}
    <div class="container" style="margin-top:20px;">
        
        <a class="btn btn-primary" style="background-color: cadetblue;" href="/dep_add/" role="button">新建部门</a></div>
     

    <div class="container">
    <div class="card-header" style="background-color: #e3f2fd; color: #69ceec;width: 81rem;margin-top: 10px;">
        <div class="card-header" style="color: rgba(2, 9, 15, 0.274);">
           <h3>部门管理</h3> 
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item" style="background-color: #e3f2fd;">
                <form class="d-flex" role="search">
                    <input class="form-control me-2" type="search" name="f" placeholder="Search" aria-label="Search" />
                    <button class="btn btn-outline-success btn-xs"
                        style="background-color: rgb(127, 217, 242);color: white;" type="submit">search</button>
                </form>
            </li>

        </ul>
    </div>
        <div class="card" style="width: 81rem;margin-top: 20px;">
            <div class="card-header">
                注意以下是重要数据！
            </div>
            <ul class="list-group list-group-flush">
                <li class="list-group-item">
                    <table class="table table-striped">
                        <thead>
                            <tr >
                                <th scope="col">部门ID</th>
                                <th scope="col">部门名称</th>
                                <th scope="col">部门人数</th>
                                <th scope="col">操作</th>
                            </tr>
                        </thead>
                        <tbody>
                           {% for i in depart_list %}
                            <tr >
                              
                                <td>{{i.id}}</td>
                                
                                <td>{{i.depart_title}}</td>
                                <td>{{i.depart_number}}</td>
                                <td>
                                    <a href="/depart/{{i.id}}/delete" class="btn btn-danger btn-sm">删除</a>
                                </td>

                            </tr>
                           
                        </tbody>
                        {% endfor %}

                    </table>
                </li>

            </ul>
        </div>


    </div>
    {% endblock %}
</body>
</html>
