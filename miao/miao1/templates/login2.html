<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link rel="stylesheet" href="../static/plugins/bootstrap-5.3.7/css/bootstrap.css">
    <style>
        .a{
            width: 500px;
            height: 400px;
            border: 1px solid #dddddd;
            box-shadow: 5px 5px 20px #aaa;
            margin-left: auto;
            margin-right: auto;
            margin-top: 200px;
            padding: 20px 40px;
            
        }
        .a .b{
            text-align: center;
            

        }
    </style>
</head>
<body>
    <div class="a" >
        <h1 class="b">用户登录</h1>
        <div style="margin-left:10px ; margin-right: 10;">
             <form>
               
                    <div class="mb-3">
                        <label  class="form-label">用户名</label>
                        <input type="text" class="form-control"  placeholder="用户名">
                        
                    </div>
                    <div class="mb-3">
                        <label >密码</label>
                        <input type="password" class="form-control" placeholder="密码">
                    
                    </div>
                   <div class="mb-3">
                                <label>验证码</label>
                                <div class="row g-2">
                                    <div class="col-7">
                                        <input type="text" class="form-control"  placeholder="请输入验证码">
                                    </div>
                                    <div class="col-5">
                                        <div class="d-flex align-items-center">
                                            <img src="/imag/code/" alt="验证码" class="img-fluid captcha-img" id="captchaImage">
                                            <i class="bi bi-arrow-clockwise refresh-icon ms-2" id="refreshCaptcha"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                    <button type="submit" class="btn btn-primary">提交</button>
                   
                </form>
        </div>
       
    </div>

</body>
</html>
