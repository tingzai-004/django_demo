
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>右侧下拉菜单</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar-nav {
            width: 100%;
            display: flex;
            justify-content: space-between;
        }
        .navbar {
            background-color:rgb(118, 243, 230) !important; 
        }
        .nav-left {
            display: flex;
        }
        .nav-right {
            display: flex;
            margin-left: auto;
        }
        
       
    </style>
</head>
<body>
    {% block list_content%}
    {% endblock %}
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="/info/">ZIDD单位人员管理</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav">
                    <div class="nav-left">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="/admin_list/">管理员账户</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/balance/">宿舍水电管理</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/dep_list/">部门管理</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="/dorm_list/">宿舍管理</a>
                        </li>
                    </div>
                    
                    <div class="nav-right">
                        <!-- 右侧下拉菜单 -->
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                              {{request.session.info}}
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="#">个人资料</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="/logout/">退出登录</a></li>
                            </ul>
                        </li>
                          
                    </div>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container content">
        {% block content %}
        <!-- 子模板的内容将在这里显示 -->
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
